services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: xiaosongshu-rustfs-local
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-xiaosongshu}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-xiaosongshu123456}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: ${RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./rustfs/data:/data
    command: ["--console-enable", "/data"]
    restart: unless-stopped
