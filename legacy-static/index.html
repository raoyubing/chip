          </div>
          <div>
            <h1>小松鼠</h1>
            <p>Workbench</p>
          </div>
        </div>

        <nav class="nav" aria-label="主导航">
          <button class="nav-item active" data-view="dashboard">
            <span class="nav-icon">◎</span>
            <span>工作台概览</span>
          </button>
          <button class="nav-item" data-view="jobs">
            <span class="nav-icon">▦</span>
            <span>职位管理</span>
          </button>
          <button class="nav-item" data-view="candidates">
            <span class="nav-icon">◉</span>
            <span>简历甄选</span>
          </button>
          <button class="nav-item" data-view="salary">
            <span class="nav-icon">⌁</span>
            <span>薪酬调研</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span class="online-dot"></span>
          <span>离线模式 · 本地存储</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Recruitment Workbench</p>
            <h2 id="viewTitle">工作台概览</h2>
          </div>
          <div class="user-panel">
            <div class="job-switcher">
              <label for="jobSelect">当前职位</label>
              <select id="jobSelect"></select>
            </div>
            <div class="avatar" id="userAvatar">饶</div>
            <div>
              <strong id="currentUser">饶玉冰</strong>
              <span>HR 负责人</span>
            </div>
          </div>
        </header>

        <section id="app" class="content" aria-live="polite"></section>
      </main>
    </div>

    <div id="modalRoot" class="modal-root" hidden></div>

    <script src="assets/vendor/echarts.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
